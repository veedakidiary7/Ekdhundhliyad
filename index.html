<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veeda ki Diary | Yaadon ka Safar</title>
    <style>
        :root {
            --accent-color: #d4a373; /* Warm gold/brown */
            --bg-color: #fefae0;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #fefae0 0%, #faedcd 100%);
            margin: 0;
            padding: 0;
            scroll-behavior: smooth;
        }

        /* Header with Animation */
        header {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-size: 3rem;
            color: #588157;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        header p {
            font-size: 1.2rem;
            color: #606c38;
            letter-spacing: 1px;
        }

        /* Music Player Styling */
        .music-container {
            text-align: center;
            margin-bottom: 30px;
        }

        /* Grid Layout */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Card Styling */
        .diary-card {
            background: white;
            border-radius: 2px; /* Square diary look */
            padding: 15px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 3px solid var(--accent-color);
        }

        .diary-card:hover {
            transform: scale(1.03) rotate(1deg);
            box-shadow: 10px 10px 25px rgba(0,0,0,0.15);
        }

        .media-box {
            width: 100%;
            height: 450px;
            overflow: hidden;
            border-radius: 5px;
        }
